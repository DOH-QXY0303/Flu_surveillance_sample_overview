  function buildLayout(bins) {
    return {
      barmode: "stack",
      xaxis: {
        title:         { text: "Specimen Date Received", font: { size: 13 } },
        type:          "category",
        categoryorder: "array",
        categoryarray: bins,
        tickangle:     -40,
        automargin:    true
      },
      yaxis: {
        title:     { text: "Number of Samples", font: { size: 13 } },
        rangemode: "tozero"
      },
      legend: {
        orientation: "v", x: 1.01, y: 1,
        bgcolor: "rgba(255,255,255,0.85)", bordercolor: "#ddd",
        borderwidth: 1, font: { size: 11 }
      },
      margin:        { l: 60, r: 230, t: 20, b: 110 },
      plot_bgcolor:  "#fafafa",
      paper_bgcolor: "#ffffff",
      hoverlabel:    { align: "left", namelength: -1 }
    };
  }

  var config = {
    responsive: true,
    displayModeBar: true,
    modeBarButtonsToRemove: ["lasso2d","select2d"]
  };

  function buildTraces(iv, mv) {
    var key  = iv + "__" + mv;
    var list = ALL_TRACES[key] || [];
    return list.map(function (t) {
      return {
        x:             t.x,
        y:             t.y,
        text:          t.text,
        name:          t.name,
        marker:        { color: t.color },
        type:          "bar",
        textposition:  "none",
        hovertemplate: "%{text}<extra></extra>"
      };
    });
  }

  function getBins(iv, mv) {
    return ALL_TRACES[iv + "__" + mv + "__bins"] || [];
  }

  var initIv = "Week", initMv = "SubmitterName";
  Plotly.newPlot("flu-plot",
    buildTraces(initIv, initMv),
    buildLayout(getBins(initIv, initMv)),
    config);

  function refresh() {
    var iv = document.getElementById("iv-sel").value;
    var mv = document.getElementById("mv-sel").value;
    Plotly.react("flu-plot",
      buildTraces(iv, mv),
      buildLayout(getBins(iv, mv)),
      config);
  }

  document.getElementById("iv-sel").addEventListener("change", refresh);
  document.getElementById("mv-sel").addEventListener("change", refresh);
})();
